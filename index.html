<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Events Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      text-align: center;
    }

    .icon { font-size: 52px; margin-bottom: 16px; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #718096;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-primary {
      background: #2563eb;
      color: white;
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #374151;
      font-size: 14px;
      padding: 13px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #cbd5e0;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .instructions {
      display: none;
      text-align: left;
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }
    .instructions.visible { display: block; }

    .instructions p {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .instructions p:last-child { margin-bottom: 0; }
    .instructions strong { color: #1a202c; }

    .url-box {
      background: #edf2f7;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #2d3748;
      word-break: break-all;
      margin-top: 10px;
      font-family: monospace;
      cursor: pointer;
      border: 1px solid #e2e8f0;
    }
    .url-box:active { background: #e2e8f0; }

    .copied {
      font-size: 11px;
      color: #38a169;
      margin-top: 6px;
      display: none;
    }

    .note {
      font-size: 12px;
      color: #a0aec0;
      margin-top: 24px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">📅</div>
  <h1>Family Events Calendar</h1>
  <p class="subtitle">Birthdays, anniversaries &amp; special occasions — with automatic reminders at 8 AM.</p>

  <a class="btn btn-primary" id="mainBtn" href="#">Add to My Calendar</a>

  <div class="divider">or</div>

  <button class="btn btn-secondary" onclick="toggleInstructions()">Manual instructions</button>

  <div class="instructions" id="instructions">
    <p id="manualText"></p>
    <div class="url-box" id="urlBox" onclick="copyUrl()">
      webcal://chris-10.github.io/famcal/family_events.ics
    </div>
    <p class="copied" id="copied">Copied!</p>
  </div>

  <p class="note">Subscribing keeps your calendar automatically up to date if events are ever added or changed.</p>
</div>

<script>
  const WEBCAL = "webcal://chris-10.github.io/famcal/family_events.ics";
  const HTTPS  = "https://chris-10.github.io/famcal/family_events.ics";

  const isAndroid = /android/i.test(navigator.userAgent);
  const isIOS     = /iphone|ipad|ipod/i.test(navigator.userAgent);

  const btn = document.getElementById("mainBtn");

  // Both platforms use webcal:// — iOS handles it natively,
  // Google Calendar on Android registers as a webcal:// handler.
  btn.href = WEBCAL;

  // Fallback: if webcal doesn't fire within 1.5s, show manual instructions
  btn.addEventListener("click", function() {
    setTimeout(function() {
      if (!document.hidden) {
        document.getElementById("instructions").classList.add("visible");
        setManualText();
      }
    }, 1500);
  });

  function setManualText() {
    const el = document.getElementById("manualText");
    const ub = document.getElementById("urlBox");
    if (isAndroid) {
      el.innerHTML = "Open <strong>Google Calendar</strong> app &rarr; tap <strong>&#9776; Menu</strong> &rarr; <strong>Settings</strong> &rarr; <strong>Subscribe to calendar</strong>. Paste the URL below:";
      ub.textContent = HTTPS;
    } else {
      el.innerHTML = "Open <strong>Safari</strong> and paste the link below into the address bar, then tap <strong>Go</strong>. Calendar will open automatically.";
      ub.textContent = WEBCAL;
    }
  }

  function toggleInstructions() {
    const el = document.getElementById("instructions");
    el.classList.toggle("visible");
    if (el.classList.contains("visible")) setManualText();
  }

  function copyUrl() {
    const text = document.getElementById("urlBox").textContent.trim();
    navigator.clipboard.writeText(text).then(function() {
      const c = document.getElementById("copied");
      c.style.display = "block";
      setTimeout(function() { c.style.display = "none"; }, 2000);
    });
  }
</script>
</body>
</html>
